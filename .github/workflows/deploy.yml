name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: [main]
  # 也支持在 Actions 页面手动触发
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的会等旧的结束
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        # 默认即可。如有特殊需求可取消注释：
        # with:
        #   path: .                # 仓库里项目所在的目录
        #   node-version: 22       # Node 版本
        #   package-manager: npm   # 包管理器

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
